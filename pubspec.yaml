name: inventario_bodega
description: "Aplicacion de inventario de bodega - conteo fisico con escaneo de codigo de barras e importacion/exportacion de Excel (SICAR)."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # Base de datos local
  sqflite: ^2.3.3
  path: ^1.9.0

  # Importar / exportar Excel (.xlsx)
  excel: ^4.0.6
  file_picker: ^8.1.2
  path_provider: ^2.1.4

  # Escaneo de codigo de barras
  mobile_scanner: ^5.2.3
  permission_handler: ^11.3.1

  # Compartir / guardar archivo exportado
  share_plus: ^11.0.0

  # Formato de numeros
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
